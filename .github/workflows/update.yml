name: Daily Weather Update

on:
  # Run every day at 1:00 AM IST (7:30 PM UTC previous day)
  schedule:
    - cron: "30 19 * * *"

  # Allows you to run it manually from the GitHub Actions page
  workflow_dispatch:

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      # Download your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install required packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Create credentials.json from GitHub Secret
      - name: Create Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      # Run your script
      - name: Run weather update
        run: |
          python update_weather.py
